name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flet requests

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Clean Old Local Cache
        run: |
          rm -rf build
          rm -rf dist
          rm -f main.spec
          rm -rf .flet

      - name: Accept ALL Android & NDK Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || yes | ${ANDROID_HOME}/tools/bin/sdkmanager --licenses || true

      - name: Initialize App Shell (إنشاء ملفات الأندرويد)
        run: |
          cd $GITHUB_WORKSPACE
          # نخليه يعمل توليد للملفات بس ويقف قبل ما يبني الغلط
          echo "y" | flet build apk . || true

      - name: Inject Custom Android Settings (تعديل الاسم والأذونات والحجم غصب عنه)
        run: |
          cd $GITHUB_WORKSPACE
          
          # 1. تغيير اسم التطبيق في ملف الأندرويد الرسمي لـ "الأذان"
          find build/ -name "AndroidManifest.xml" -exec sed -i 's/android:label=".*"/android:label="الأذان"/g' {} +
          
          # 2. إضافة أذونات الموقع الجغرافي والظهور على الشاشة رسميًا
          find build/ -name "AndroidManifest.xml" -exec sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />' {} +

      - name: Compile Ultra Compressed APK (البناء الفعلي المضغوط بمحرك فلاتر)
        run: |
          # هندخل للمجلد اللي الـ flet عمله ونبني بـ flutter الأصلي المقاوم للمساحات الكبيرة
          cd build/flutter
          flutter build apk --release --target-platform=android-arm64 --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Azan-App-Compressed
          path: build/flutter/build/app/outputs/flutter-apk/*-release.apk
