name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flet requests

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Clean Old Local Cache
        run: |
          rm -rf build
          rm -rf dist
          rm -f main.spec
          rm -rf .flet

      - name: Accept ALL Android & NDK Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || yes | ${ANDROID_HOME}/tools/bin/sdkmanager --licenses || true

      - name: Initialize App Shell
        run: |
          cd $GITHUB_WORKSPACE
          echo "y" | flet build apk . || true

      - name: Inject Custom Android Settings (التعديل الهندسي الدقيق)
        run: |
          cd $GITHUB_WORKSPACE
          
          # 1. تغيير اسم التطبيق في ملف النصوص الرئيسي للأندرويد لـ "الأذان"
          MAIN_STRINGS="build/flutter/android/app/src/main/res/values/strings.xml"
          if [ -f "$MAIN_STRINGS" ]; then
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">الأذان<\/string>/g' "$MAIN_STRINGS"
          fi
          
          # 2. إضافة الأذونات في ملف الأندرويد الرئيسي فقط دون المكاتب الفرعية
          MAIN_MANIFEST="build/flutter/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MAIN_MANIFEST" ]; then
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />' "$MAIN_MANIFEST"
          fi

      - name: Compile Ultra Compressed APK
        run: |
          cd build/flutter
          flutter build apk --release --target-platform=android-arm64 --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Azan-App-Compressed
          path: build/flutter/build/app/outputs/flutter-apk/*-release.apk
